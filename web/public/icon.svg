<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" role="img" aria-labelledby="title desc">
  <title id="title">SQLSentinnel PWA App Icon</title>
  <desc id="desc">A professional icon with a database cylinder and monitoring pulse arc.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9" />
      <stop offset="100%" stop-color="#2d6bb0" />
    </linearGradient>
    <linearGradient id="cylBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563a8" />
      <stop offset="100%" stop-color="#1a4a80" />
    </linearGradient>
    <linearGradient id="cylSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <clipPath id="round">
      <rect x="80" y="80" width="520" height="520" rx="116" />
    </clipPath>
  </defs>

  <rect x="80" y="80" width="520" height="520" rx="116" fill="url(#bg)" />
  <rect x="80" y="80" width="520" height="520" rx="116" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.07" />

  <g clip-path="url(#round)">
    <rect x="242" y="310" width="196" height="148" fill="url(#cylBody)" />
    <ellipse cx="340" cy="458" rx="98" ry="26" fill="#1a4a80" />
    <ellipse cx="340" cy="458" rx="98" ry="26" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-opacity="0.4" />
    <rect x="242" y="356" width="196" height="2" fill="#ffffff" fill-opacity="0.07" />
    <rect x="242" y="402" width="196" height="2" fill="#ffffff" fill-opacity="0.07" />
    <rect x="242" y="310" width="196" height="148" fill="url(#cylSheen)" />
    <ellipse cx="340" cy="310" rx="98" ry="26" fill="url(#cylTop)" />
    <ellipse cx="340" cy="310" rx="98" ry="26" fill="none" stroke="#7ab8f5" stroke-width="1.5" stroke-opacity="0.5" />
    <ellipse cx="340" cy="310" rx="68" ry="18" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12" />

    <path d="M 220 298 A 128 128 0 0 1 460 298" fill="none" stroke="#f59e0b" stroke-width="22" stroke-linecap="round" stroke-opacity="0.12" />
    <path d="M 234 292 A 112 112 0 0 1 446 292" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" stroke-opacity="0.9" />
    <path d="M 268 252 L 296 252 L 308 224 L 322 278 L 336 238 L 348 252 L 412 252" fill="none" stroke="#fcd34d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="412" cy="252" r="9" fill="#f59e0b" />
    <circle cx="412" cy="252" r="4.5" fill="#fef3c7" />
  </g>
